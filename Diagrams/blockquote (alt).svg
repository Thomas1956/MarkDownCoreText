<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 620" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif">

  <defs>
    <marker id="arrowEnd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563EB"/>
    </marker>
    <marker id="arrowStart" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M10,0 L0,5 L10,10 z" fill="#2563EB"/>
    </marker>
    <style>
      .doc-edge   { stroke: #94A3B8; stroke-width: 1; stroke-dasharray: 4 3; }
      .doc-edge-label { fill: #64748B; font-size: 11px; }
      .bg-box     { fill: #EEF2F7; stroke: #CBD5E1; stroke-width: 1; }
      .bar        { fill: #475569; }
      .textline   { fill: #94A3B8; }
      .dim-line   { stroke: #2563EB; stroke-width: 1; }
      .dim-tick   { stroke: #2563EB; stroke-width: 1; }
      .dim-label  { fill: #1E3A8A; font-size: 12px; font-weight: 500; }
      .dim-value  { fill: #2563EB; font-size: 11px; }
      .title      { fill: #0F172A; font-size: 14px; font-weight: 600; }
      .caption    { fill: #475569; font-size: 11px; font-style: italic; }
    </style>
  </defs>

  <!-- Titel -->
  <text x="20" y="28" class="title">BlockQuote – horizontale Maße</text>

  <!-- Dokument-Ränder (gestrichelt) -->
  <line x1="60"  y1="60"  x2="60"  y2="560" class="doc-edge"/>
  <line x1="820" y1="60"  x2="820" y2="560" class="doc-edge"/>
  <text x="60"  y="580" text-anchor="middle" class="doc-edge-label">linker Dokumentrand</text>
  <text x="820" y="580" text-anchor="middle" class="doc-edge-label">rechter Dokumentrand</text>

  <!-- Hintergrund-Box (BlockQuote-Fläche) -->
  <rect x="180" y="180" width="520" height="280" rx="6" class="bg-box"/>

  <!-- Balken -->
  <rect x="210" y="200" width="14" height="240" class="bar"/>

  <!-- simulierte Text-Zeilen -->
  <rect x="270" y="210" width="380" height="6" class="textline"/>
  <rect x="270" y="226" width="360" height="6" class="textline"/>
  <rect x="270" y="242" width="395" height="6" class="textline"/>
  <rect x="270" y="258" width="320" height="6" class="textline"/>
  <rect x="270" y="284" width="380" height="6" class="textline"/>
  <rect x="270" y="300" width="350" height="6" class="textline"/>
  <rect x="270" y="316" width="395" height="6" class="textline"/>
  <rect x="270" y="332" width="290" height="6" class="textline"/>
  <rect x="270" y="358" width="360" height="6" class="textline"/>
  <rect x="270" y="374" width="380" height="6" class="textline"/>
  <rect x="270" y="390" width="310" height="6" class="textline"/>
  <rect x="270" y="416" width="395" height="6" class="textline"/>
  <rect x="270" y="432" width="270" height="6" class="textline"/>

  <!-- =========== Maßlinien =========== -->

  <!-- blockIndentLeft : Dokumentrand → Box-Anfang -->
  <line x1="60"  y1="130" x2="180" y2="130" class="dim-line" marker-start="url(#arrowStart)" marker-end="url(#arrowEnd)"/>
  <line x1="60"  y1="120" x2="60"  y2="170" class="dim-tick"/>
  <line x1="180" y1="120" x2="180" y2="170" class="dim-tick"/>
  <text x="120" y="120" text-anchor="middle" class="dim-label">blockIndentLeft</text>

  <!-- blockIndentRight : Box-Ende → Dokumentrand -->
  <line x1="700" y1="130" x2="820" y2="130" class="dim-line" marker-start="url(#arrowStart)" marker-end="url(#arrowEnd)"/>
  <line x1="700" y1="120" x2="700" y2="170" class="dim-tick"/>
  <line x1="820" y1="120" x2="820" y2="170" class="dim-tick"/>
  <text x="760" y="120" text-anchor="middle" class="dim-label">blockIndentRight</text>

  <!-- blockBarIndent : Box-Anfang → Balken (Leader oben), Label an linker Kante -->
  <line x1="180" y1="170" x2="180" y2="200" class="dim-tick"/>
  <line x1="210" y1="170" x2="210" y2="200" class="dim-tick"/>
  <line x1="180" y1="172" x2="210" y2="172" class="dim-line" marker-start="url(#arrowStart)" marker-end="url(#arrowEnd)"/>
  <text x="178" y="162" text-anchor="end" class="dim-label">blockBarIndent</text>

  <!-- blockBarWidth : Balkenbreite, unten gemessen -->
  <line x1="210" y1="440" x2="210" y2="478" class="dim-tick"/>
  <line x1="224" y1="440" x2="224" y2="478" class="dim-tick"/>
  <line x1="210" y1="476" x2="224" y2="476" class="dim-line" marker-start="url(#arrowStart)" marker-end="url(#arrowEnd)"/>
  <text x="217" y="496" text-anchor="middle" class="dim-label">blockBarWidth</text>

  <!-- blockPaddingLeft : Balken → Text-Anfang, Label an rechter Kante -->
  <line x1="224" y1="170" x2="224" y2="200" class="dim-tick"/>
  <line x1="270" y1="170" x2="270" y2="200" class="dim-tick"/>
  <line x1="224" y1="172" x2="270" y2="172" class="dim-line" marker-start="url(#arrowStart)" marker-end="url(#arrowEnd)"/>
  <text x="272" y="162" text-anchor="start" class="dim-label">blockPaddingLeft</text>

  <!-- blockPaddingRight : Text-Ende → Box-Ende -->
  <line x1="665" y1="170" x2="665" y2="200" class="dim-tick"/>
  <line x1="700" y1="170" x2="700" y2="200" class="dim-tick"/>
  <line x1="665" y1="172" x2="700" y2="172" class="dim-line" marker-start="url(#arrowStart)" marker-end="url(#arrowEnd)"/>
  <text x="682" y="162" text-anchor="middle" class="dim-label">blockPaddingRight</text>

  <!-- blockVerticalOffset : Verschiebung der Box nach unten, am linken Dokumentrand -->
  <line x1="85" y1="170" x2="85" y2="180" class="dim-line" marker-start="url(#arrowStart)" marker-end="url(#arrowEnd)"/>
  <line x1="75" y1="170" x2="95" y2="170" class="dim-tick"/>
  <line x1="75" y1="180" x2="95" y2="180" class="dim-tick"/>
  <text x="100" y="178" text-anchor="start" class="dim-label">blockVerticalOffset</text>

  <!-- Legende -->
  <g transform="translate(60, 540)">
    <rect x="0"   y="0" width="18" height="10" class="bg-box"/>
    <text x="24"  y="9" class="caption">Hintergrund (blockBackgroundColor)</text>
    <rect x="240" y="0" width="18" height="10" class="bar"/>
    <text x="264" y="9" class="caption">Balken (blockBarColor)</text>
    <rect x="380" y="2" width="60" height="4" class="textline"/>
    <text x="450" y="9" class="caption">Textzeilen</text>
  </g>

</svg>
