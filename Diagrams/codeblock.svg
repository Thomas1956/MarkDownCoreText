<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 620" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif">

  <defs>
    <marker id="arrowEnd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563EB"/>
    </marker>
    <marker id="arrowStart" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M10,0 L0,5 L10,10 z" fill="#2563EB"/>
    </marker>
    <style>
      .doc-edge      { stroke: #94A3B8; stroke-width: 1; stroke-dasharray: 4 3; }
      .doc-edge-label{ fill: #64748B; font-size: 11px; }
      .textline      { fill: #94A3B8; }
      .codeline      { fill: #475569; }
      .box-bg        { fill: #EEF2F7; stroke: #94A3B8; stroke-width: 2; }
      .dim-line      { stroke: #2563EB; stroke-width: 1; }
      .dim-tick      { stroke: #2563EB; stroke-width: 1; }
      .dim-label     { fill: #1E3A8A; font-size: 12px; font-weight: 500; }
      .annot-leader  { stroke: #1E3A8A; stroke-width: 0.8; fill: none; }
      .title         { fill: #0F172A; font-size: 14px; font-weight: 600; }
      .caption       { fill: #475569; font-size: 11px; font-style: italic; }
    </style>
  </defs>

  <!-- Titel -->
  <text x="20" y="28" class="title">Code-Block – horizontale und vertikale Maße</text>

  <!-- Dokument-Ränder -->
  <line x1="60"  y1="60"  x2="60"  y2="540" class="doc-edge"/>
  <line x1="820" y1="60"  x2="820" y2="540" class="doc-edge"/>
  <text x="60"  y="558" text-anchor="middle" class="doc-edge-label">linker Dokumentrand</text>
  <text x="820" y="558" text-anchor="middle" class="doc-edge-label">rechter Dokumentrand</text>

  <!-- =========== Absatz davor (2 Zeilen) =========== -->
  <rect x="160" y="86"  width="540" height="6" class="textline"/>
  <rect x="160" y="104" width="500" height="6" class="textline"/>

  <!-- =========== codeSpacingBefore Maße =========== -->
  <line x1="100" y1="112" x2="100" y2="150" class="dim-line" marker-start="url(#arrowStart)" marker-end="url(#arrowEnd)"/>
  <line x1="90"  y1="112" x2="110" y2="112" class="dim-tick"/>
  <line x1="90"  y1="150" x2="110" y2="150" class="dim-tick"/>
  <text x="115" y="135" text-anchor="start" class="dim-label">codeSpacingBefore</text>

  <!-- =========== Code-Box =========== -->
  <rect x="200" y="150" width="460" height="260" rx="3" class="box-bg"/>

  <!-- =========== Code-Zeilen (monospace style) =========== -->
  <rect x="232" y="172" width="300" height="6" class="codeline"/>
  <rect x="232" y="188" width="250" height="6" class="codeline"/>
  <rect x="248" y="204" width="320" height="6" class="codeline"/>
  <rect x="248" y="220" width="280" height="6" class="codeline"/>
  <rect x="232" y="236" width="200" height="6" class="codeline"/>
  <rect x="232" y="252" width="350" height="6" class="codeline"/>
  <rect x="248" y="268" width="240" height="6" class="codeline"/>
  <rect x="248" y="284" width="310" height="6" class="codeline"/>
  <rect x="232" y="300" width="270" height="6" class="codeline"/>
  <rect x="232" y="316" width="180" height="6" class="codeline"/>
  <rect x="232" y="332" width="340" height="6" class="codeline"/>
  <rect x="248" y="348" width="295" height="6" class="codeline"/>
  <rect x="232" y="364" width="220" height="6" class="codeline"/>
  <rect x="232" y="380" width="160" height="6" class="codeline"/>

  <!-- =========== codeSpacing Maße =========== -->
  <line x1="100" y1="412" x2="100" y2="448" class="dim-line" marker-start="url(#arrowStart)" marker-end="url(#arrowEnd)"/>
  <line x1="90"  y1="412" x2="110" y2="412" class="dim-tick"/>
  <line x1="90"  y1="448" x2="110" y2="448" class="dim-tick"/>
  <text x="115" y="432" text-anchor="start" class="dim-label">codeSpacing</text>

  <!-- =========== Absatz danach (2 Zeilen) =========== -->
  <rect x="160" y="452" width="520" height="6" class="textline"/>
  <rect x="160" y="470" width="380" height="6" class="textline"/>

  <!-- =========== viewMarginLeft / viewMarginRight =========== -->
  <line x1="60"  y1="74" x2="160" y2="74" class="dim-line" marker-start="url(#arrowStart)" marker-end="url(#arrowEnd)"/>
  <line x1="60"  y1="64" x2="60"  y2="120" class="dim-tick"/>
  <line x1="160" y1="64" x2="160" y2="120" class="dim-tick"/>
  <text x="110" y="62" text-anchor="middle" class="dim-label">viewMarginLeft</text>

  <line x1="720" y1="74" x2="820" y2="74" class="dim-line" marker-start="url(#arrowStart)" marker-end="url(#arrowEnd)"/>
  <line x1="720" y1="64" x2="720" y2="120" class="dim-tick"/>
  <line x1="820" y1="64" x2="820" y2="120" class="dim-tick"/>
  <text x="770" y="62" text-anchor="middle" class="dim-label">viewMarginRight</text>

  <!-- =========== codeIndentLeft / codeIndentRight =========== -->
  <line x1="160" y1="132" x2="200" y2="132" class="dim-line" marker-start="url(#arrowStart)" marker-end="url(#arrowEnd)"/>
  <line x1="200" y1="120" x2="200" y2="160" class="dim-tick"/>
  <text x="160" y="125" text-anchor="start" class="dim-label">codeIndentLeft</text>

  <line x1="660" y1="132" x2="720" y2="132" class="dim-line" marker-start="url(#arrowStart)" marker-end="url(#arrowEnd)"/>
  <line x1="660" y1="120" x2="660" y2="160" class="dim-tick"/>
  <text x="720" y="125" text-anchor="end" class="dim-label">codeIndentRight</text>

  <!-- =========== codePaddingLeft / codePaddingRight (innerhalb der Box, oben) =========== -->
  <line x1="200" y1="161" x2="232" y2="161" class="dim-line" marker-start="url(#arrowStart)" marker-end="url(#arrowEnd)"/>
  <line x1="232" y1="153" x2="232" y2="190" class="dim-tick"/>
  <text x="235" y="171" text-anchor="start" class="dim-label">codePaddingLeft</text>

  <line x1="628" y1="161" x2="660" y2="161" class="dim-line" marker-start="url(#arrowStart)" marker-end="url(#arrowEnd)"/>
  <line x1="628" y1="153" x2="628" y2="190" class="dim-tick"/>
  <text x="625" y="171" text-anchor="end" class="dim-label">codePaddingRight</text>

  <!-- =========== codeBorderColor / codeBorderWidth annotation =========== -->
  <path d="M170 340 L196 340" class="annot-leader"/>
  <text x="165" y="343" text-anchor="end" class="dim-label">codeBorderColor / codeBorderWidth</text>

  <!-- Legende -->
  <g transform="translate(60, 510)">
    <rect x="0"   y="2" width="60" height="4" class="textline"/>
    <text x="68"  y="9" class="caption">normaler Text</text>
    <rect x="160" y="2" width="60" height="4" class="codeline"/>
    <text x="228" y="9" class="caption">Code-Zeile (monospace)</text>
    <rect x="380" y="-1" width="40" height="10" class="box-bg"/>
    <text x="428" y="9" class="caption">Hintergrund + Rahmen</text>
  </g>
</svg>
