<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 620" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif">

  <defs>
    <marker id="arrowEnd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563EB"/>
    </marker>
    <marker id="arrowStart" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M10,0 L0,5 L10,10 z" fill="#2563EB"/>
    </marker>
    <style>
      .doc-edge      { stroke: #94A3B8; stroke-width: 1; stroke-dasharray: 4 3; }
      .doc-edge-label{ fill: #64748B; font-size: 11px; }
      .textline      { fill: #94A3B8; }
      .ruler-bg      { fill: #F1F5F9; stroke: #CBD5E1; stroke-width: 1; }
      .ruler-line    { fill: #475569; }
      .dim-line      { stroke: #2563EB; stroke-width: 1; }
      .dim-tick      { stroke: #2563EB; stroke-width: 1; }
      .dim-label     { fill: #1E3A8A; font-size: 12px; font-weight: 500; }
      .title         { fill: #0F172A; font-size: 14px; font-weight: 600; }
      .caption       { fill: #475569; font-size: 11px; font-style: italic; }
    </style>
  </defs>

  <!-- Titel -->
  <text x="20" y="28" class="title">Ruler (Trennlinie) – Maße</text>

  <!-- Dokument-Ränder -->
  <line x1="60"  y1="60"  x2="60"  y2="500" class="doc-edge"/>
  <line x1="820" y1="60"  x2="820" y2="500" class="doc-edge"/>
  <text x="60"  y="518" text-anchor="middle" class="doc-edge-label">linker Dokumentrand</text>
  <text x="820" y="518" text-anchor="middle" class="doc-edge-label">rechter Dokumentrand</text>

  <!-- =========== Absatz davor =========== -->
  <rect x="160" y="92"  width="540" height="6" class="textline"/>
  <rect x="160" y="110" width="500" height="6" class="textline"/>

  <!-- =========== Ruler (Hintergrund + Linie) =========== -->
  <rect x="200" y="180" width="500" height="60" rx="2" class="ruler-bg"/>
  <rect x="200" y="205" width="500" height="10"        class="ruler-line"/>

  <!-- =========== Absatz danach =========== -->
  <rect x="160" y="262" width="540" height="6" class="textline"/>
  <rect x="160" y="280" width="430" height="6" class="textline"/>

  <!-- =========== viewMarginLeft / viewMarginRight =========== -->
  <line x1="60"  y1="70" x2="160" y2="70" class="dim-line" marker-start="url(#arrowStart)" marker-end="url(#arrowEnd)"/>
  <line x1="60"  y1="60" x2="60"  y2="120" class="dim-tick"/>
  <line x1="160" y1="60" x2="160" y2="240" class="dim-tick"/>
  <text x="110" y="58" text-anchor="middle" class="dim-label">viewMarginLeft</text>

  <line x1="720" y1="70" x2="820" y2="70" class="dim-line" marker-start="url(#arrowStart)" marker-end="url(#arrowEnd)"/>
  <line x1="720" y1="60" x2="720" y2="240" class="dim-tick"/>
  <line x1="820" y1="60" x2="820" y2="120" class="dim-tick"/>
  <text x="770" y="58" text-anchor="middle" class="dim-label">viewMarginRight</text>

  <!-- =========== rulerPaddingLeft / rulerPaddingRight =========== -->
  <line x1="160" y1="146" x2="200" y2="146" class="dim-line" marker-start="url(#arrowStart)" marker-end="url(#arrowEnd)"/>
  <line x1="200" y1="130" x2="200" y2="240" class="dim-tick"/>
  <text x="158" y="140" text-anchor="end" class="dim-label">rulerPaddingLeft</text>

  <line x1="700" y1="146" x2="720" y2="146" class="dim-line" marker-start="url(#arrowStart)" marker-end="url(#arrowEnd)"/>
  <line x1="700" y1="130" x2="700" y2="240" class="dim-tick"/>
  <text x="722" y="140" text-anchor="start" class="dim-label">rulerPaddingRight</text>

  <!-- =========== rulerHeight (vertikal, rechts) =========== -->
  <line x1="740" y1="180" x2="740" y2="240" class="dim-line" marker-start="url(#arrowStart)" marker-end="url(#arrowEnd)"/>
  <line x1="720" y1="180" x2="755" y2="180" class="dim-tick"/>
  <line x1="720" y1="240" x2="755" y2="240" class="dim-tick"/>
  <text x="760" y="213" text-anchor="start" class="dim-label">rulerHeight</text>

  <!-- =========== rulerLineHeight (vertikal, links neben der Linie) =========== -->
  <line x1="180" y1="205" x2="180" y2="215" class="dim-line" marker-start="url(#arrowStart)" marker-end="url(#arrowEnd)"/>
  <line x1="170" y1="205" x2="195" y2="205" class="dim-tick"/>
  <line x1="170" y1="215" x2="195" y2="215" class="dim-tick"/>
  <text x="168" y="213" text-anchor="end" class="dim-label">rulerLineHeight</text>

  <!-- Hinweise -->
  <text x="20" y="350" class="caption">Der Ruler besteht aus einem Hintergrund-Rechteck (rulerHeight) und einer mittig liegenden Linie</text>
  <text x="20" y="366" class="caption">(rulerLineHeight). Beide spannen sich zwischen rulerPaddingLeft und rulerPaddingRight auf.</text>
  <text x="20" y="384" class="caption">Default-Werte sind absichtlich klein (Höhe 10 pt, Linienstärke 1,5 pt) – in dieser Skizze übertrieben dargestellt.</text>

  <!-- Legende -->
  <g transform="translate(60, 470)">
    <rect x="0"   y="2" width="60" height="4" class="textline"/>
    <text x="68"  y="9" class="caption">normaler Text</text>
    <rect x="180" y="0" width="40" height="10" class="ruler-bg"/>
    <text x="228" y="9" class="caption">Hintergrund (rulerHeight)</text>
    <rect x="400" y="2" width="40" height="6" class="ruler-line"/>
    <text x="448" y="9" class="caption">Linie (rulerLineHeight)</text>
  </g>
</svg>
